<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rdr2 nonsense detector</title>

<style>
:root{
  --bg:#0b0504;
  --card:#1a0c0a;
  --gold:#c9a44d;
  --gold2:#f3d27a;
  --red:#7a1c1c;
  --text:#f5e6c8;
  --muted:#cbbfa9;
}

*{box-sizing:border-box}
body{
  margin:0;
  background: radial-gradient(circle at 30% 20%, #1d0a08 0%, var(--bg) 60%);
  font-family: "Georgia", serif;
  color:var(--text);
  overflow-x:hidden;
}

/* Dust particles */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  opacity:.5;
}

/* Layout */
.wrapper{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.title{
  font-size:28px;
  font-weight:900;
  letter-spacing:1px;
  text-transform:lowercase;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
}

.badge{
  padding:8px 14px;
  border:1px solid var(--gold);
  border-radius:999px;
  font-size:12px;
  background:rgba(201,164,77,.1);
}

/* Card */
.card{
  background:linear-gradient(180deg, rgba(26,12,10,.95), rgba(16,6,5,.95));
  border:1px solid rgba(201,164,77,.4);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  position:relative;
  overflow:hidden;
}

.question{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

.hint{
  font-size:12px;
  color:var(--muted);
  margin-bottom:20px;
}

.answers{
  display:grid;
  gap:14px;
}

.option{
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(201,164,77,.3);
  cursor:pointer;
  transition:.2s ease;
  background:rgba(0,0,0,.3);
}

.option:hover{
  transform:translateY(-2px);
  border-color:var(--gold2);
  background:rgba(201,164,77,.08);
}

.option strong{
  display:block;
}

.next{
  margin-top:20px;
  padding:10px 16px;
  background:linear-gradient(180deg, var(--gold), var(--red));
  border:none;
  border-radius:999px;
  color:#000;
  font-weight:900;
  cursor:pointer;
  display:none;
}

/* Wanted meter */
.meter{
  margin-top:30px;
}

.bar{
  height:12px;
  border-radius:999px;
  background:#000;
  border:1px solid var(--gold);
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, var(--gold2), var(--red));
  transition:.3s ease;
}

/* Toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#120705;
  padding:14px 20px;
  border-radius:14px;
  border:1px solid var(--gold);
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
}

.toast.show{
  opacity:1;
}

/* Wanted poster result */
.result{
  text-align:center;
}

.wanted{
  font-size:34px;
  font-weight:900;
  margin-bottom:10px;
  letter-spacing:2px;
}
.verdict{
  font-size:18px;
  margin-bottom:10px;
}
.small{
  font-size:14px;
  color:var(--muted);
}
</style>
</head>

<body>

<canvas id="dust"></canvas>

<div class="wrapper">
  <div class="header">
    <div>
      <div class="title">rdr2 nonsense detector 🤠</div>
      <div class="subtitle">this is extremely scientific. don’t lie.</div>
    </div>
    <div class="badge" id="status">wanted level: 0</div>
  </div>

  <div class="card" id="app"></div>

  <div class="meter">
    <div class="bar"><div class="fill" id="progress"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

/* QUIZ */
const QUIZ = [
{
q:"be honest what are you actually doing in rdr2",
hint:"don’t lie the horse knows",
opts:[
{t:"living at horseshoe overlook",toast:"chapter 2 enjoyer detected. elite taste immediately.",score:4},
{t:"roaming for 4 hours doing nothing",toast:"you log in just to vibe and honestly… valid.",score:3},
{t:"causing minor issues in valentine",toast:"why is the sheriff already after you 😭",score:2},
{t:"trying to get the cleanest fit possible",toast:"drip > storyline. respect.",score:3}
]},
{
q:"your horse trips on a rock. what happens next.",
hint:"be mature.",
opts:[
{t:"immediately apologize to the horse",toast:"horse empathy detected.",score:4},
{t:"sit there in silence processing it",toast:"this is a character development moment 😭",score:3},
{t:"reload the save",toast:"correct moral decision honestly.",score:4},
{t:"crash out immediately",toast:"bro declared war on a rock.",score:1}
]},
{
q:"pick your rdr2 core memory",
hint:"this says a lot about you",
opts:[
{t:"chapter 2 camp vibes at sunset",toast:"yeah you actually know ball.",score:4},
{t:"random npc interaction that made no sense",toast:"npc dialogue is insane sometimes 😭",score:3},
{t:"perfecting the drip in saint denis",toast:"city cowboy era unlocked.",score:3},
{t:"starting something small that escalated fast",toast:"one punch turned into a 10 minute chase.",score:2}
]},
{
q:"you’re in camp at sunset. what are you doing",
hint:"chapter 2 energy only",
opts:[
{t:"chilling by the fire lowkey listening to everything",
toast:"campfire main character energy detected.",
score:4},
{t:"antagonizing someone for absolutely no reason",
toast:"bro woke up and chose chaos at horseshoe overlook 😭",
score:2},
{t:"cleaning your weapons dramatically",
toast:"you’re preparing for something that hasn’t even happened yet.",
score:3},
{t:"feeding and brushing your horse like it’s royalty",
toast:"horse priority > everything. correct behavior.",
score:4}
]},
{
q:"final question. be serious.",
hint:"this decides everything",
opts:[
{t:"chapter 2 is peak rdr2",toast:"correct answer. you win.",score:4},
{t:"free roam > story",toast:"roaming hits different.",score:3},
{t:"horse simulator and i love it",toast:"and you’re absolutely right.",score:3},
{t:"i randomly replay missions",toast:"you’re built like me actually.",score:4}
]}
];

/* Logic */
let index=0;
let score=0;

const app=document.getElementById("app");
const toast=document.getElementById("toast");
const progress=document.getElementById("progress");
const status=document.getElementById("status");

function showToast(msg){
toast.innerText=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),1500);
}

function render(){
if(index>=QUIZ.length){
return showResult();
}

const q=QUIZ[index];
app.innerHTML=`
<div class="question">${q.q}</div>
<div class="hint">${q.hint}</div>
<div class="answers">
${q.opts.map((o,i)=>`
<div class="option" onclick="select(${i})">
<strong>${o.t}</strong>
</div>
`).join("")}
</div>
<button class="next" id="nextBtn" onclick="next()">next</button>
`;
progress.style.width=(index/QUIZ.length*100)+"%";
}

function select(i){
const opt=QUIZ[index].opts[i];
score+=opt.score;
showToast(opt.toast);
document.getElementById("nextBtn").style.display="inline-block";
status.innerText="wanted level: "+Math.min(5,Math.ceil(score/4));
}

function next(){
index++;
render();
}

function showResult(){
progress.style.width="100%";
let verdict;
if(score>15){
verdict="ACTUALLY GOATED";
}else if(score>10){
verdict="VIBING & SLIGHT CHAOS 🤣";
}else{
verdict="MENACE TO VALENTINE SOCIETY";
}
app.innerHTML=`
<div class="result">
<div class="wanted">WANTED</div>
<div class="verdict">${verdict}</div>
<div class="small">co-op privileges unlocked.</div>
<button class="next" style="display:inline-block;margin-top:20px;" onclick="restart()">run it back</button>
</div>
`;
}

function restart(){
index=0;
score=0;
render();
}

/* Dust FX */
const canvas=document.getElementById("dust");
const ctx=canvas.getContext("2d");
let W,H,particles;

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
particles=new Array(120).fill(0).map(()=>({
x:Math.random()*W,
y:Math.random()*H,
r:Math.random()*2,
vy:.3+Math.random()*.5
}));
}
window.addEventListener("resize",resize);
resize();

function animate(){
ctx.clearRect(0,0,W,H);
ctx.fillStyle="rgba(243,210,122,.15)";
particles.forEach(p=>{
p.y+=p.vy;
if(p.y>H)p.y=0;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

render();
</script>
</body>
</html>
