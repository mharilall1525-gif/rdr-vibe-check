<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>rdr2 nonsense detector</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:radial-gradient(circle at top,#3a0d05 0%,#120201 70%);
color:#f5e6c8;
overflow-x:hidden;
}

/* subtle dust animation */
body::before{
content:"";
position:fixed;
inset:0;
background-image:radial-gradient(rgba(255,200,120,.1) 1px, transparent 1px);
background-size:3px 3px;
opacity:.15;
pointer-events:none;
}

.container{
max-width:800px;
margin:80px auto;
padding:30px;
border:1px solid rgba(255,200,120,.2);
border-radius:12px;
background:rgba(0,0,0,.45);
box-shadow:0 0 40px rgba(0,0,0,.8);
}

h1{
text-align:center;
letter-spacing:2px;
}

.question{
font-size:22px;
margin-bottom:20px;
min-height:40px;
}

.option{
display:block;
width:100%;
margin:12px 0;
padding:14px;
background:rgba(255,200,120,.08);
border:1px solid rgba(255,200,120,.2);
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.option:hover{
background:rgba(255,200,120,.25);
transform:translateY(-2px);
}

.progress{
height:8px;
background:rgba(255,200,120,.2);
border-radius:20px;
overflow:hidden;
margin-top:30px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#f5c77a,#a14b1a);
transition:.4s;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#3a1a08;
padding:12px 20px;
border-radius:20px;
color:#f5e6c8;
opacity:0;
animation:toast 2s ease forwards;
}

@keyframes toast{
0%{opacity:0;transform:translate(-50%,20px);}
20%{opacity:1;transform:translate(-50%,0);}
80%{opacity:1;}
100%{opacity:0;}
}

/* POSTER */
.poster-overlay{
position:fixed;
inset:0;
background:radial-gradient(circle at center,#3a0d05 0%,#120201 70%);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.poster{
width:520px;
max-width:90%;
background:#e7d7b3;
color:#3a1a08;
padding:60px 40px;
text-align:center;
border-radius:6px;
box-shadow:0 0 100px rgba(0,0,0,.9);
position:relative;
font-family:serif;
overflow:hidden;
}

.poster h1{
font-size:48px;
letter-spacing:6px;
margin-bottom:10px;
}

.poster h2{
font-size:22px;
margin-bottom:20px;
}

.stars{
margin-bottom:15px;
letter-spacing:5px;
}

.stamp{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:42px;
font-weight:bold;
color:#8b0000;
border:4px solid #8b0000;
padding:10px 20px;
opacity:0;
animation:stampIn .6s ease forwards .5s;
}

@keyframes stampIn{
to{
transform:translate(-50%,-50%) scale(1);
opacity:.9;
}
}

.poster-overlay::after{
content:"";
position:absolute;
bottom:0;
left:0;
right:0;
height:200px;
background:radial-gradient(circle at bottom,rgba(255,120,20,.4),transparent 70%);
animation:flicker 3s infinite;
}

@keyframes flicker{
0%,100%{opacity:.4;}
50%{opacity:.75;}
}

button{
margin-top:20px;
padding:10px 18px;
border:none;
background:#3a1a08;
color:#e7d7b3;
cursor:pointer;
border-radius:4px;
font-weight:bold;
}
</style>
</head>

<body>

<audio id="ambient" loop autoplay>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4f13e6c67f.mp3">
</audio>

<audio id="horse">
<source src="https://cdn.pixabay.com/audio/2021/08/04/audio_2e5e90c7d9.mp3">
</audio>

<div class="container" id="app">
<h1>rdr2 nonsense detector 🤠</h1>
<div class="question" id="question"></div>
<div id="options"></div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
</div>

<script>

let score=0;
let current=0;

const questions=[
{
q:"be honest. what are you actually doing in red dead",
opts:[
{t:"just vibing at camp",toast:"chapter 2 enjoyer detected.",s:4},
{t:"starting chaos in valentine respectfully",toast:"valentine not safe.",s:2},
{t:"roaming 3 hours doing nothing",toast:"main story? never heard of her.",s:3},
{t:"bonding with my horse more than people",toast:"horse loyalty elite.",s:4}
]
},
{
q:"you’re in camp at sunset. what are you doing",
opts:[
{t:"chilling by the fire listening to everything",toast:"main character energy.",s:4},
{t:"antagonizing someone for no reason",toast:"you woke up violent.",s:2},
{t:"cleaning weapons dramatically",toast:"locked in for no reason.",s:3},
{t:"feeding your horse like royalty",toast:"correct behavior.",s:4}
]
},
{
q:"dutch says he has a plan. you:",
opts:[
{t:"trust him blindly",toast:"that’s insane.",s:1},
{t:"nod but don’t believe him",toast:"intelligence detected.",s:4},
{t:"packing supplies already",toast:"you know how this ends.",s:3},
{t:"mentally preparing for chaos",toast:"experience speaks.",s:4}
]
},
{
q:"favorite chapter energy?",
opts:[
{t:"chapter 2 forever",toast:"peak rdr2.",s:5},
{t:"pain arc enjoyer",toast:"emotional damage.",s:3},
{t:"chaos only",toast:"menace tendencies.",s:2},
{t:"replay yearly tradition",toast:"real one.",s:5}
]
}
];

function typeWriter(text, element){
element.innerHTML="";
let i=0;
let interval=setInterval(()=>{
element.innerHTML+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(interval);
},30);
}

function loadQuestion(){
let q=questions[current];
typeWriter(q.q,document.getElementById("question"));
let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";
q.opts.forEach(o=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=o.t;
btn.onclick=()=>{
score+=o.s;
showToast(o.toast);
current++;
updateProgress();
if(current<questions.length){
setTimeout(loadQuestion,700);
}else{
setTimeout(showResult,800);
}
};
optionsDiv.appendChild(btn);
});
}

function updateProgress(){
let percent=((current)/questions.length)*100;
document.getElementById("progress").style.width=percent+"%";
}

function showToast(text){
let t=document.createElement("div");
t.className="toast";
t.innerText=text;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function showResult(){

document.getElementById("horse").play();

let verdict, sub, honor, stars;

if(score>=16){
verdict="ACTUALLY GOATED";
sub="chapter 2 energy confirmed.";
honor="HIGH HONOR";
stars="★★★★★";
}else if(score>=11){
verdict="vibing but a lil dangerous 👀";
sub="valentine sheriff mildly concerned.";
honor="NEUTRAL";
stars="★★★☆☆";
}else{
verdict="MENACE TO SOCIETY";
sub="banned from the saloon.";
honor="LOW HONOR";
stars="★☆☆☆☆";
}

document.body.innerHTML+=`
<div class="poster-overlay">
<div class="poster">
<h1>WANTED</h1>
<div class="stars">${stars}</div>
<h2>${verdict}</h2>
<div class="stamp">${honor}</div>
<p>${sub}</p>
<p>campfire seat secured at horseshoe overlook.</p>
<button onclick="location.reload()">run it back</button>
</div>
</div>
`;
}

loadQuestion();

</script>
</body>
</html>
